# Performance Tuning for ASUS Zenbook Duo UX8406MA
# Intel Core Ultra 9 185H + 32GB RAM + NVMe SSD

# ============================================
# NETWORKING
# ============================================
# TCP buffer sizes (min/default/max)
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.ipv4.tcp_rmem=4096 87380 16777216
net.ipv4.tcp_wmem=4096 65536 16777216

# TCP performance
net.ipv4.tcp_window_scaling=1
net.ipv4.tcp_timestamps=1
net.ipv4.tcp_sack=1
net.ipv4.tcp_no_metrics_save=1
net.ipv4.tcp_mtu_probing=1
net.core.netdev_max_backlog=5000
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_keepalive_time=600
net.ipv4.tcp_keepalive_intvl=30
net.ipv4.tcp_keepalive_probes=5

# ============================================
# MEMORY
# ============================================
# Swappiness (10 = prefer RAM, swap only when needed)
vm.swappiness=10

# Dirty page settings (SSD-optimized)
vm.dirty_ratio=5
vm.dirty_background_ratio=2
vm.dirty_expire_centisecs=3000
vm.dirty_writeback_centisecs=500

# Memory overcommit
vm.overcommit_memory=0
vm.overcommit_ratio=80

# ============================================
# FILESYSTEM
# ============================================
# Increase max open files
fs.file-max=2097152
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=1024

# ============================================
# KERNEL
# ============================================
# Scheduler: enable automatic NUMA balancing
kernel.numa_balancing=1

# Reduce syslog overhead
kernel.printk_ratelimit=60

# ============================================
# SECURITY HARDENING
# ============================================
# Prevent IP spoofing
net.ipv4.conf.all.rp_filter=1
net.ipv4.conf.default.rp_filter=1

# Disable ICMP redirects (we're not a router)
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.default.accept_redirects=0
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.default.accept_redirects=0
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0

# Disable source routing
net.ipv4.conf.all.accept_source_route=0
net.ipv4.conf.default.accept_source_route=0
net.ipv6.conf.all.accept_source_route=0
net.ipv6.conf.default.accept_source_route=0

# SYN flood protection
net.ipv4.tcp_syncookies=1
net.ipv4.tcp_max_syn_backlog=2048

# Ignore ICMP broadcast
net.ipv4.icmp_echo_ignore_broadcasts=1

# Log suspicious packets
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1

# Disable IPv6 if not needed
# net.ipv6.conf.all.disable_ipv6=1
# net.ipv6.conf.default.disable_ipv6=1
