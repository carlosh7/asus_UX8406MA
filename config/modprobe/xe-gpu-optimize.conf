# Intel xe GPU Power Optimization for Zenbook Duo UX8406MA
# Module parameters format: options <module> <param>=<value>

# Enable Frame Buffer Compression
options xe enable_fbc=1

# Enable Panel Self Refresh
options xe enable_psr=1

# Enable System Agent GPU Voltage
options xe enable_sagv=1

# Enable Intel Power Saving
options xe enable_ips=1

# Enable Display C-states
options xe enable_dc=-1

# Enable Panel Replay
options xe enable_panel_replay=-1
