# Intel xe GPU Power Optimization for Zenbook Duo UX8406MA
# Enables power-saving features for better battery life

# Frame Buffer Compression (saves VRAM bandwidth and power)
options enable_fbc=1

# Panel Self Refresh (reduces display power when static)
options enable_psr=1

# System Agent GPU Voltage (dynamic voltage scaling)
options enable_sagv=1

# Intel Power Saving (GPU clock gating)
options enable_ips=1

# Display C-states (power saving for display pipeline)
options enable_dc=-1

# Panel Replay (alternative to PSR for newer panels)
options enable_panel_replay=-1
